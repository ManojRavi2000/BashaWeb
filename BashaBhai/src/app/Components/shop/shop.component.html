 <div class="container-fluid spical-section">

  <h2 class="text-center custom_h2 mb-4">
    Basha Bhai Special Biryani
  </h2>

  
  <div class="row g-4">
    <div
      class="col-lg-3 col-md-4 col-sm-6 col-6"
      *ngFor="let food of foods">

      <div class="card text-center custom_card h-100">

        <img class="card-img-top" [src]="'data:image/jpeg;base64,' + food.image" alt="Card image" style="width:100%; height: 200px; object-fit: cover;">

        <div class="card-body d-flex flex-column">
          <p class="card-title custom_cardtitle">
            {{ food.foodName }}
          </p>

          <p class="card-text custom_p text-truncate">
            {{ food.decription }}
          </p>

          <p class="fw-bold mb-2">
             {{ food.price }} AED
          </p>

          <button
  class="btn card-button mt-auto"
  data-bs-toggle="modal"
  data-bs-target="#myModal"
  (click)="getItemById(food.foodId!)">
  View More
</button>

        </div>

      </div>
    </div>
  </div>


  <p *ngIf="foods.length === 0" class="text-center text-muted mt-4">
    No items available
  </p>

 
  <nav *ngIf="totalPages > 1" class="mt-5">
    <ul class="pagination justify-content-center">

      <li class="page-item" [class.disabled]="currentPage === 1">
        <button class="page-link" (click)="changePage(currentPage - 1)">
          Previous
        </button>
      </li>

      <li
        class="page-item"
        *ngFor="let page of [].constructor(totalPages); let i = index"
        [class.active]="currentPage === i + 1">

        <button class="page-link" (click)="changePage(i + 1)">
          {{ i + 1 }}
        </button>
      </li>

      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <button class="page-link" (click)="changePage(currentPage + 1)">
          Next
        </button>
      </li>

    </ul>
  </nav>
</div>

<div class="modal fade" id="myModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h4>{{ name2.foodName }}</h4>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
       <img class="card-img-top" [src]="'data:image/jpeg;base64,' + name2.image" alt="Card image" style="width:100%; height: 200px; object-fit: cover;">

        <p>{{name2.decription}}</p>
        <p><strong>{{ name2.price }}AED</strong></p>
             <p>{{name2.decription1}}</p>
        <p>{{name2.decription2}}</p>
      </div>
<div class="modal-footer">
            <a type="button" class="btn btn-success" href="https://food.noon.com/outlet/BSHBHBC3Q3/">Order now</a>
          <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
        </div>
    </div>
  </div>
</div>
